services:
  db:
    image: postgres:15-alpine
    container_name: maya-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_password}
      POSTGRES_DB: ${POSTGRES_DB:-maya_soc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maya-network

  redis:
    image: redis:7-alpine
    container_name: maya-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maya-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: maya-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - maya-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: maya-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - maya-network

  neo4j:
    image: neo4j:5.14
    container_name: maya-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_apoc_export_data_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - maya-network

  prometheus:
    image: prom/prometheus:latest
    container_name: maya-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - maya-network

  grafana:
    image: grafana/grafana:latest
    container_name: maya-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - maya-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maya-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # Application
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-False}
      APP_NAME: "MAYA SOC Enterprise"
      APP_VERSION: "2.0.0"
      
      # Database (Phase 2)
      DATABASE_URL: postgresql://${POSTGRES_USER:-soc_user}:${POSTGRES_PASSWORD:-soc_password}@db:5432/${POSTGRES_DB:-maya_soc}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-soc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_password}
      POSTGRES_DB: ${POSTGRES_DB:-maya_soc}
      
      # Kafka (Phase 2)
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BROKERS: kafka:9092
      
      # Redis
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Neo4j
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_AUTH: neo4j/neo4jpassword
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Security (Phase 2)
      SECRET_KEY: ${SECRET_KEY:-${JWT_SECRET_KEY:-change_this_in_production_please_32_chars}}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-admin}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-ChangeThisAdminPass123!}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_in_production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-https://maya.vaultrap.com,https://vaultrap.com,https://www.vaultrap.com,http://localhost:5173}
      
      # Prometheus (Phase 2)
      PROMETHEUS_ENABLED: "true"
      
    volumes:
      - ./backend/app:/app/app:ro
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - maya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: maya-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - maya-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  backend_logs:
  prometheus_data:
  grafana_data:

networks:
  maya-network:
    driver: bridge
