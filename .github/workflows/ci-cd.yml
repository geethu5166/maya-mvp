name: CI/CD Pipeline - MAYA SOC Enterprise

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
      - 'requirements.txt'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'

jobs:
  # ================================
  # BACKEND TESTS
  # ================================
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_maya_soc
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock
      
      - name: Lint with flake8
        working-directory: ./backend
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Type check with mypy
        working-directory: ./backend
        run: |
          pip install mypy
          mypy app --ignore-missing-imports --no-error-summary || true
      
      - name: Test compilation
        working-directory: ./backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/models/database.py
          python -m py_compile app/models/database_session.py
          python -m py_compile app/services/kafka_service.py
          python -m py_compile app/services/incident_detection_engine.py
          python -m py_compile app/services/monitoring.py
          echo "✅ All modules compiled successfully"
      
      - name: Run unit tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_maya_soc
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing || true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          fail_ci_if_error: false
  
  # ================================
  # SECURITY SCANNING
  # ================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run Bandit (security linter)
        run: |
          pip install bandit
          bandit -r ./backend/app -f json -o bandit-report.json || true
          cat bandit-report.json || true
      
      - name: Run Safety (dependency checker)
        run: |
          pip install safety
          safety check --file requirements.txt --json || true
      
      - name: Scan for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true
  
  # ================================
  # BUILD DOCKER IMAGE
  # ================================
  build-backend:
    name: Build Backend Docker Image
    needs: test-backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  # ================================
  # DOCKER COMPOSE VALIDATION
  # ================================
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      
      - name: Validate docker-compose.yml
        run: |
          docker-compose -f docker-compose.yml config
          echo "✅ docker-compose.yml is valid"
      
      - name: Check Docker Compose services
        run: |
          docker-compose -f docker-compose.yml config --services
  
  # ================================
  # INTEGRATION TESTS (Optional)
  # ================================
  integration-tests:
    name: Integration Tests
    needs: build-backend
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Start Docker Compose stack
        run: |
          docker-compose up -d
          sleep 30
          docker-compose ps
      
      - name: Health checks
        run: |
          echo "Checking API health..."
          curl -f http://localhost:8000/health || exit 1
          echo "✅ API is healthy"
          
          echo "Checking Prometheus..."
          curl -f http://localhost:9090/-/healthy || exit 1
          echo "✅ Prometheus is healthy"
      
      - name: Test metrics endpoint
        run: |
          echo "Testing Prometheus metrics export..."
          curl -s http://localhost:8000/api/v1/metrics | head -20
      
      - name: Cleanup
        if: always()
        run: |
          docker-compose down
          docker-compose logs --tail=50

  # ================================
  # DEPLOY TO STAGING (Optional)
  # ================================
  deploy-staging:
    name: Deploy to Staging
    needs: [test-backend, build-backend, validate-compose]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to staging
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          echo "Deploying to staging environment..."
          echo "This step requires SSH key and staging server setup"
          echo "In production, use: ssh -i key user@host 'cd /app && docker-compose pull && docker-compose up -d'"
  
  # ================================
  # NOTIFY ON COMPLETION
  # ================================
  notify:
    name: Notify Results
    needs: [test-backend, security-scan, build-backend, validate-compose]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Job Status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ CI/CD Pipeline completed successfully"
          else
            echo "❌ CI/CD Pipeline failed"
          fi
