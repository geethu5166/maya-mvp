name: Quick Test - Python Code Quality

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
  push:
    branches: [ develop ]
    paths:
      - 'backend/**'

jobs:
  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy
      
      - name: Check code formatting with Black
        working-directory: ./backend
        run: |
          black --check app || echo "Format issues found (non-blocking)"
      
      - name: Check import sorting with isort
        working-directory: ./backend
        run: |
          isort --check-only app || echo "Import sort issues found (non-blocking)"
      
      - name: Lint with flake8
        working-directory: ./backend
        run: |
          flake8 app --count --max-line-length=127

      - name: Test Python module compilation
        working-directory: ./backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/models/database.py
          python -m py_compile app/models/database_session.py
          python -m py_compile app/services/kafka_service.py
          python -m py_compile app/services/incident_detection_engine.py
          python -m py_compile app/services/monitoring.py
