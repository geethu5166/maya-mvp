# Prometheus Configuration for MAYA SOC Enterprise

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'maya-soc-monitor'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alert_rules.yml"

scrape_configs:
  # ================================
  # MAYA SOC Backend (Phase 2)
  # ================================
  - job_name: 'maya-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'maya-backend'

  # ================================
  # Database Monitoring
  # ================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
    scrape_interval: 30s

  # ================================
  # Kafka Monitoring
  # ================================
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    scrape_interval: 30s

  # ================================
  # Redis Monitoring
  # ================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # ================================
  # Prometheus Self
  # ================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
