<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYA Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040608;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;padding:20px}
.box{border:1px solid rgba(0,255,136,0.2);padding:48px 40px;width:100%;max-width:420px;background:#080d12}
.logo{color:#00ff88;font-size:24px;font-weight:800;letter-spacing:4px;margin-bottom:4px}
.sub{color:#4a6060;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;background:#00ff88;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.field{margin-bottom:24px}
.lbl{color:#4a6060;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block}
input{width:100%;padding:14px 16px;background:#040608;border:1px solid rgba(0,255,136,0.15);color:#e0e0e0;font-size:14px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#00ff88}
input::placeholder{color:#2a4040}
button{width:100%;padding:16px;background:#00ff88;color:#040608;border:none;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;margin-top:8px;transition:background 0.2s}
button:hover{background:#00c896}
.error{color:#ff3366;font-size:11px;margin-bottom:20px;padding:12px;border:1px solid rgba(255,51,102,0.3);background:rgba(255,51,102,0.05)}
.footer{margin-top:32px;text-align:center;color:#2a4040;font-size:10px;letter-spacing:1px}
@media(max-width:480px){.box{padding:32px 20px}}
</style>
</head>
<body>
<div class="box">
<div class="logo">VAULTRAP</div>
<div class="sub"><span class="dot"></span>MAYA SECURITY PLATFORM</div>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
<div class="field">
<span class="lbl">Username</span>
<input type="text" name="username" placeholder="Enter username" required autofocus/>
</div>
<div class="field">
<span class="lbl">Password</span>
<input type="password" name="password" placeholder="Enter password" required/>
</div>
<button type="submit">Access MAYA</button>
</form>
<div class="footer">PROTECTED BY VAULTRAP SECURITY 2026</div>
</div>
</body>
</html>
